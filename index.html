<!DOCTYPE html>
<html>
<head>
<title>AI Cryptarithm Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>AI Cryptarithm Solver Game</h1>

<input id="customPuzzle" placeholder="Example: SEND+MORE=MONEY">
<button onclick="loadCustomPuzzle()">Load My Puzzle</button>

<h2 id="puzzleText"></h2>

<div id="inputs"></div>

<br>

<button onclick="giveHint()">Hint</button>
<button onclick="undoMove()">Undo</button>
<button onclick="newPuzzle()">Generate Puzzle</button>
<button onclick="previousPuzzle()">Previous Puzzle</button>
<button onclick="autoSolve()">AI Solve Puzzle</button>

<h3 id="message">Game started!</h3>

<p>Time: <span id="timer">0</span> sec</p>
<p>Hints Used: <span id="hints">0</span></p>

<script src="script.js"></script>

</body>
</html>
