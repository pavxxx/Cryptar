<!DOCTYPE html>
<html>
<head>
<title>Crypt Arithmetic Game</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>

body {
    margin: 0;
    
    background: linear-gradient(to right, #457bf0, hsl(155, 84%, 57%), #15f533);
    color: rgb(5, 0, 0);
    text-align: center;
    
}

/* Heading */

h1 {
    margin-top: 90px;
    
    font-size: 40px;
}

/* Moving Box */

.start-box {

    width: 260px;
    margin: 150px auto;
    padding: 35px;

    background: white;
    color: black;

    border-radius: 15px;
    font-size: 30px;
    font-weight: bold;

    cursor: pointer;

    animation: moveBox 2s infinite alternate;

}

/* Animation */

@keyframes moveBox {

    from {
        transform: translateY(-10px);
    }

    to {
        transform: translateY(10px);
    }

}

/* Hover effect */

.start-box:hover {

    background: #000008;
    color: white;
}


</style>
</head>


<body>

<h1>WELCOME TO CRYPT ARTHMETIC GAME!</h1>


<div class="start-box"
onclick="startGame()">

START GAME

</div>



<script>

function startGame() {

    window.location.href = "index.html";

}

</script>


</body>
</html>
